<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>

    <div class="calculadora">
        
        <input type="text" id="visor" disabled>

        <div class="botoes">
            <button class="btn limpar" id="limpar">C</button>
            <button class="btn operador" id="dividir">/</button>
            <button class="btn operador" id="multiplicar">*</button>
            <button class="btn apagar" id="apagar">DEL</button>

            <button class="btn numero">7</button>
            <button class="btn numero">8</button>
            <button class="btn numero">9</button>
            <button class="btn operador" id="subtrair">-</button>

            <button class="btn numero">4</button>
            <button class="btn numero">5</button>
            <button class="btn numero">6</button>
            <button class="btn operador" id="somar">+</button>

            <button class="btn numero">1</button>
            <button class="btn numero">2</button>
            <button class="btn numero">3</button>
            <button class="btn igual" id="igual">=</button>

            <button class="btn numero zero">0</button>
            <button class="btn numero ponto">.</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
