<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora web funcional desenvolvida com foco em modularidade.">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora | App Suite</title>
</head>
<body>

    <header>
        <nav class="menu-navegacao" aria-label="Navegação do sistema">
            <a href="tabuada.html" class="btn-navegar">Ir para a Tabuada →</a>
        </nav>
    </header>

    <main class="container">
        <section class="calculadora" aria-label="Interface da Calculadora">
            
            <input type="text" id="visor" class="visor" disabled aria-label="Visor da calculadora" placeholder="0">

            <div class="botoes" role="grid">
                <button class="btn btn--action" id="limpar" aria-label="Limpar tudo">C</button>
                <button class="btn btn--operator" data-op="/">/</button>
                <button class="btn btn--operator" data-op="*">×</button>
                <button class="btn btn--action" id="apagar" aria-label="Apagar último caractere">DEL</button>

                <button class="btn btn--num">7</button>
                <button class="btn btn--num">8</button>
                <button class="btn btn--num">9</button>
                <button class="btn btn--operator" data-op="-">-</button>

                <button class="btn btn--num">4</button>
                <button class="btn btn--num">5</button>
                <button class="btn btn--num">6</button>
                <button class="btn btn--operator" data-op="+">+</button>

                <button class="btn btn--num">1</button>
                <button class="btn btn--num">2</button>
                <button class="btn btn--num">3</button>
                <button class="btn btn--equal" id="igual" aria-label="Calcular">=</button>

                <button class="btn btn--num zero">0</button>
                <button class="btn btn--num">.</button>
            </div>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
