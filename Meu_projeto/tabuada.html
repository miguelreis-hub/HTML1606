<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada Dinâmica</title>
    <link rel="stylesheet" href="tabuada.css">
</head>
<body>

    <nav class="menu-navegacao">
        <a href="index.html" class="btn-navegar">Ir para a Calculadora →</a>
    </nav>


    <div class="container">
        <h1>Tabuada Interativa</h1>
        <p>Digite um número para gerar a tabuada automaticamente.</p>
        
        <div class="formulario">
            <input type="number" id="numInput" placeholder="Ex: 7" min="1">
            <button id="btnGerar">Gerar Tabuada</button>
        </div>

        <div id="resultado" class="resultado-container">
            <p class="placeholder-texto">Nenhum número inserido ainda.</p>
        </div>
    </div>

    <script src="tabuada.js"></script>
</body>
</html>
