<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Tempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Conversor de Tempo</h1>
        <p>Digite o valor em minutos para converter em segundos.</p>
        
        <div class="formulario">
            <input type="number" id="minutosInput" placeholder="Ex: 5" min="0">
            <button id="btnConverter">Converter</button>
        </div>

        <div id="resultado" class="resultado-container">
            <p class="placeholder-texto">Nenhum valor convertido ainda.</p>
        </div>
    </div>

    <script src="script_da_conversao.js"></script>
</body>
</html>
